# Auto-deploy to Netlify on push to main
# Setup: docs/GITHUB_DEPLOYMENT.md

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  ci:
    name: CI Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test

  build:
    name: Build All Apps
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run build -w dashboard-app
      - run: npm run build -w user-app
      - run: npm run build -w reports-app
      - name: Build host app
        env:
          VITE_DASHBOARD_REMOTE: ${{ secrets.VITE_DASHBOARD_REMOTE }}
          VITE_USER_REMOTE: ${{ secrets.VITE_USER_REMOTE }}
          VITE_REPORTS_REMOTE: ${{ secrets.VITE_REPORTS_REMOTE }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: npm run build -w host-app
      - uses: actions/upload-artifact@v4
        with:
          name: production-dist
          retention-days: 7
          path: |
            host-app/dist
            dashboard-app/dist
            user-app/dist
            reports-app/dist

  deploy-dashboard:
    name: Deploy Dashboard
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: production-dist
      - uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: dashboard-app/dist
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: 'Deploy dashboard - ${{ github.sha }}'
          enable-pull-request-comment: false
          enable-commit-comment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID_DASHBOARD }}

  deploy-user:
    name: Deploy User
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: production-dist
      - uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: user-app/dist
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: 'Deploy user - ${{ github.sha }}'
          enable-pull-request-comment: false
          enable-commit-comment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID_USER }}

  deploy-reports:
    name: Deploy Reports
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: production-dist
      - uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: reports-app/dist
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: 'Deploy reports - ${{ github.sha }}'
          enable-pull-request-comment: false
          enable-commit-comment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID_REPORTS }}

  deploy-host:
    name: Deploy Host
    runs-on: ubuntu-latest
    needs: [deploy-dashboard, deploy-user, deploy-reports]
    environment: production
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: production-dist
      - uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: host-app/dist
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: 'Deploy host - ${{ github.sha }}'
          enable-pull-request-comment: true
          enable-commit-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID_HOST }}
